name: Keep Backend Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL || 'https://exoris.onrender.com' }}
    steps:
      - name: Ping backend health endpoint
        run: |
          set -euo pipefail
          base_url="${BACKEND_BASE_URL%/}"
          curl --fail --silent --show-error --max-time 60 --retry 2 --retry-delay 5 "$base_url/api/health/"
